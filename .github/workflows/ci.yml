# Runs on every push and pull request to main. Vercel deploys main
# automatically, so this is the last automated check before production:
# lint, type-check + build, and the unit test suite must all pass.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check and build
        run: npm run build

      - name: Unit tests
        run: npm test
